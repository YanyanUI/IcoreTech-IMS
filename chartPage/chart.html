<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="chart.css">
</head>
<body>
    <div id="header">
        <div class="header-content">
            <img src="../Assets/image_fb4d3f88-removebg-preview.png" alt="logo" class="small-icon">
            <h2>ICore Tech</h2>
        </div>
        <div class="header-content">
            <h2>Admin</h2>
            <img src="../Assets/userIcon.png" alt="user" class="small-icon" id="userIcon">
        </div>
    </div>

    <div id="nav-main-container">
        <div id="sideBar">
        <button id="menu">
            <img src="../Assets/iconmonstr-menu-left-lined-240.png" alt="menu" id="menuIcon">
        </button>
        <nav class="navBar">
            <img src="../Assets/image_fb4d3f88-removebg-preview.png" alt="logo" id="small-logo">
            <ul>
                <li>
                    <img src="../Assets/homeIcon.png" alt="homeIcon" class="buttonIcon">
                    <a href="../index.html" class="nav-page-link">Home</a>
                </li>
                <li>
                    <img src="../Assets/stockIcon.png" alt="stockIcon" class="buttonIcon">
                    <a href="../stockPage/stock.html" class="nav-page-link">Stocks</a>
                </li>
                <li>
                    <img src="../Assets/chartIcon.png" alt="chartIcon" class="buttonIcon">
                    <a href="../chartPage/chart.html" class="nav-page-link">Chart</a>
                </li>
                <li>
                    <img src="../Assets/supplierIcon.png" alt="supplierIcon" class="buttonIcon">
                    <a href="../supplierPage/supplier.html" class="nav-page-link">Suppliers</a>
                </li>
                <li>
                    <img src="../Assets/itemsIcon.png" alt="itemsIcon" class="buttonIcon">
                    <a href="../ItemPage/item.html" class="nav-page-link">Items</a>
                </li>
            </ul>
        </nav>
    </div>

    <div id="mainContent">
        <div id="main-page-header">
            <h1>Charts</h1>
        </div>

        <div id="tab-table">
            <select name="categories" id="category-list" class="tab-table-dropDown">
                <option value="">1 Month</option>
                <option value="">5 Month</option>
                <option value="">1 Month</option>
                <option value="">12 Month</option>
            </select>
            <select name="categories" id="category-list" class="tab-table-dropDown">
                <option value="">All Categories</option>
                <option value="">Computer</option>
                <option value="">Network</option>
            </select>
        </div>

        <div id="chart-container">
        <div id="myChart-container">
            <canvas id="myChart"></canvas>
        </div>
            
        <div id="monthChart-container">
            <canvas id="monthChart"></canvas>
        </div>
        </div>

        <div class="total-boxes-container">
            <div class="outer-box">
                <div class="inner-box">
                    <span class="label-text"><img src="../Assets/productIcon.png" alt="Product Icon" class="small-icon-symbol">Total Product</span>
                    <span class="points-value">67</span>
                </div>            
            </div>

            <div>
                <div class="outer-box">
                    <div class="inner-box" id="lowStock">
                        <span class="label-text" id="lowStock"><img src="../Assets/orangeWarningSign.png" alt="Warning logo" class="small-icon-symbol">Low Stock</span>
                        <span class="points-value">6</span>
                    </div>
                </div>
            </div>

            <div>
                <div class="outer-box">
                    <div class="inner-box" id="outStock">
                        <span class="label-text" id="outStock"><img src="../Assets/redWarningSign.png" alt="Low icon" class="small-icon-symbol">Out of Stock</span>
                        <span class="points-value">9</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <script>
            const ctx = document.getElementById('myChart');

            const myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Overall', 'Computer', 'Network'],
                    datasets: [{
                    label: "Stocks Overview",
                    label1: 'Feb',
                    data: [8, 25, 8],
                    borderWidth: 1,
                    backgroundColor: '#5170ff',
                    }]
                    },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                    }
                });

            const ctx2 = document.getElementById("monthChart");

            const monthChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul','Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                    datasets: [{
                    label: "Stocks Overview",
                    label1: 'Feb',
                    data: [5, 8, 9, 11, 13, 15, 16, 17, 19, 21, 23, 25],
                    borderWidth: 3,
                    backgroundColor: '#5069bb',
                    fill: true
                    }]
                    },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                    }
                });

        </script>

    <script src="../index.js"></script>
    <script src="chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
